services:
  # ─────────────────────────────────────────────
  # PostgreSQL – lưu trữ user, session, event log
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-edu_monitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edu} -d ${POSTGRES_DB:-edu_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edu_net

  # ─────────────────────────────────────────────
  # Redis – cache session, rate-limit, token quota
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edu_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edu_net

  # ─────────────────────────────────────────────
  # RabbitMQ – hàng đợi nhận event log từ 500 máy
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: edu_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-edu}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbit_secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5673:5672"    # AMQP
      - "15673:15672"  # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - edu_net

  # ─────────────────────────────────────────────
  # API Server – Node.js/Express backend chính
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: edu_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu_secret}@postgres:5432/${POSTGRES_DB:-edu_monitor}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-edu}:${RABBITMQ_PASSWORD:-rabbit_secret}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
    volumes:
      - ./api:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - edu_net

  # ─────────────────────────────────────────────
  # Worker – xử lý event log bất đồng bộ từ queue
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile.worker
    container_name: edu_worker
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu_secret}@postgres:5432/${POSTGRES_DB:-edu_monitor}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-edu}:${RABBITMQ_PASSWORD:-rabbit_secret}@rabbitmq:5672
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - edu_net

  # ─────────────────────────────────────────────
  # Dashboard – React frontend cho giảng viên
  # ─────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: edu_dashboard
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - edu_net

  # ─────────────────────────────────────────────
  # Nginx – reverse proxy, SSL termination (local)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: edu_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - dashboard
    networks:
      - edu_net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  edu_net:
    driver: bridge
